{% extends 'billing/base.html' %}
{% block title %}Cambiar contraseña{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow">
      <div class="card-header bg-dark text-white"><h4>Cambia tu contraseña</h4></div>
      <div class="card-body">
        <p class="text-muted">
          Tu contraseña actual es temporal. Por seguridad, debes crear una
          nueva antes de continuar.
        </p>
        <form method="post">
          {% csrf_token %}
          {{ form.as_p }}
          <button type="submit" class="btn btn-primary w-100">Cambiar contraseña</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
