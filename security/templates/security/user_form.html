{% extends 'billing/base.html' %}
{% block title %}{{ title|default:'Edit User' }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2>{{ title|default:'Edit User' }}</h2>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Save</button>
      <a href="{% url 'security:user_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</div>
<script>
(function () {
  // Solo aplica en el formulario de creación (Edit User no tiene este campo).
  var autoCheckbox = document.getElementById('id_auto_password');
  var pass1 = document.getElementById('id_password1');
  var pass2 = document.getElementById('id_password2');
  if (!autoCheckbox || !pass1 || !pass2) return;

  function sync() {
    var auto = autoCheckbox.checked;
    [pass1, pass2].forEach(function (el) {
      el.disabled = auto;
      var wrapper = el.closest('p') || el.parentElement;
      wrapper.style.display = auto ? 'none' : '';
    });
  }
  autoCheckbox.addEventListener('change', sync);
  sync();
})();

(function () {
  // El selector "Cliente vinculado" solo tiene sentido con el rol Cliente.
  var roleSelect = document.getElementById('id_role');
  var customerSelect = document.getElementById('id_customer');
  if (!roleSelect || !customerSelect) return;

  function syncCustomer() {
    var opt = roleSelect.selectedOptions[0];
    var isCliente = !!opt && opt.text.trim() === 'Cliente';
    var wrapper = customerSelect.closest('p') || customerSelect.parentElement;
    wrapper.style.display = isCliente ? '' : 'none';
    if (!isCliente) customerSelect.value = '';
  }
  roleSelect.addEventListener('change', syncCustomer);
  syncCustomer();
})();
</script>
{% endblock %}
