databases:
  - name: sales-a2-db
    databaseName: sales_a2
    user: django_user
    plan: free

services:
  - type: web
    name: sales-a2
    env: python
    plan: free
    # El plan free no incluye Shell interactivo, así que el superusuario y
    # los roles se crean en cada build. setup_roles ya es idempotente
    # (get_or_create); createsuperuser --noinput fallaría en el 2º deploy en
    # adelante porque el usuario ya existe, por eso va envuelto en
    # "|| true" (solo para ESE paso, no para todo el build).
    # remove_stale_contenttypes: al mover CuotaCompra/PagoCuotaCompra de
    # creditos_ventas a creditos_compras quedan content types (y permisos)
    # huérfanos de la app anterior; este paso los limpia antes de setup_roles.
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py remove_stale_contenttypes --noinput && python manage.py setup_roles && (python manage.py createsuperuser --noinput || true)"
    # --timeout 60 (el default de gunicorn es 30s): exportar PDF/Excel con
    # imágenes en Cloudinary (storage remoto) puede tardar más que eso si hay
    # varios productos con foto; sin este margen el worker se mataba a medias
    # y la descarga se quedaba colgada hasta cortarse la conexión.
    startCommand: "gunicorn config.wsgi:application --timeout 60"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: sales-a2-db
          property: connectionString
      - key: BREVO_API_KEY
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
