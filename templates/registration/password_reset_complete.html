{% extends 'billing/base.html' %}
{% block title %}Contraseña actualizada{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <span class="brand-badge d-inline-flex" style="width:56px; height:56px; font-size:1.6rem; border-radius:16px; background:linear-gradient(135deg,#2fa16b,#1e9e6d);">
        <i class="bi bi-check-circle-fill"></i>
      </span>
      <h3 class="fw-bold mt-3 mb-0">¡Listo!</h3>
    </div>
    <div class="card">
      <div class="card-body p-4 text-center">
        <p class="mb-3">Tu contraseña se actualizó correctamente.</p>
        <a href="{% url 'login' %}" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Iniciar sesión
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
